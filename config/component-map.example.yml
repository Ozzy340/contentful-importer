document:
  targetContentType: contentPage
  entryIdPattern: "{{contentType}}--{{slug}}"
  fields:
    internalName:
      template: "{{metadata.title}}"
    heading:
      source: metadata.title
      required: true
    slug:
      source: metadata.slug
      transform: slug
      required: true
    heroContentArea:
      strategy: componentReference
      component: HeroStandard
    excludeFromSearch:
      default: false
    bodyContentArea:
      strategy: blockReferences
      includeKinds:
        - richText
        - component
      excludeComponents:
        - HeroStandard

components:
  HeroStandard:
    targetContentType: heroBlock
    entryIdPattern: "{{parentId}}--hero-block--{{index}}"
    fields:
      internalName:
        template: "{{metadata.title}} hero block {{index}}"
      heroStyle:
        default: Standard
      headingFontStyle:
        default: Regular
      eyebrowText:
        source: block.props.eyebrow
      subtitle:
        source: block.props.description
      lowerSubtext:
        source: block.props.lowerSubtext
      callToActions:
        strategy: nestedEntryLinks
        collection: callsToAction
      media:
        strategy: nestedEntryLink
        collection: media
      desktopImageSize:
        default: Large
      hideImageAccent:
        default: false
      theme:
        default: White
      applyGradient:
        default: false
    nestedEntries:
      callsToAction:
        source: block.props.callsToAction
        targetContentType: ctaItem
        entryIdPattern: "{{parentId}}--hero-cta--{{index}}"
        fields:
          internalName:
            template: "{{metadata.title}} hero cta {{index}}"
          linkText:
            source: item.text
            required: true
          customiseStyle:
            default: true
          style:
            source: item.style
          openUrlInNewTab:
            source: item.openInNewTab
            transform: boolean
          useExternalLink:
            default: true
          externalUrl:
            source: item.url
      media:
        source: block.props.image
        targetContentType: imageWithFocalPoint
        entryIdPattern: "{{parentId}}--hero-media--{{index}}"
        asset:
          source: item.path
          altSource: item.alt
          titleSource: item.title
          descriptionSource: item.description
          assetIdPattern: "asset--{{documentSlug}}--hero-media--{{index}}"
        fields:
          title:
            source: item.title
            required: true
          image:
            source: linkedAsset
            required: true
          altText:
            source: item.alt
          focus:
            default: Center

  MissionFraming:
    targetContentType: promoBlock
    entryIdPattern: "{{parentId}}--mission-framing--{{index}}"
    fields:
      internalName:
        template: "{{metadata.title}} mission framing {{index}}"
      heading:
        source: block.props.heading
        required: true
      headingStyle:
        default: h2
      statementText:
        source: block.props.eyebrow
      description:
        source: block.props.description
      callToAction:
        strategy: nestedEntryLink
        collection: callToAction
      style:
        default: White
      textColour:
