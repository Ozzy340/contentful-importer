    entryIdPattern: "{{parentId}}--lw--{{index}}"
    fields:
      internalName:
        template: "{{metadata.title}} logo wall {{index}}"
      eyebrowText:
        source: block.props.eyebrow
      heading:
        source: block.props.heading
      headingStyle:
        default: H2
      subtext:
        source: block.props.description
      logoItems:
        strategy: nestedEntryLinks
        collection: logoItems
      backgroundColour:
        default: White
      pauseTickerAnimation:
        default: false
    nestedEntries:
      logoItems:
        source: block.props.logos
        targetContentType: logoItem
        entryIdPattern: "{{parentId}}--li--{{index}}"
        fields:
          internalName:
            template: "{{metadata.title}} logo item {{index}}"
          colouredHoverLogo:
            strategy: nestedEntryLink
            collection: image
          logoLink:
            strategy: nestedEntryLink
            collection: link
        nestedEntries:
          image:
            source: item.image
            targetContentType: imageWithFocalPoint
            entryIdPattern: "{{parentId}}--limg--{{index}}"
            asset:
              source: item.path
              altSource: item.alt
              titleSource: item.title
              descriptionSource: item.description
              assetIdPattern: "asset--{{parentId}}--{{componentSlug}}--{{index}}"
            fields:
              title:
                source: item.title
                required: true
              image:
                source: linkedAsset
                required: true
              altText:
                source: item.alt
              focus:
                default: Center
          link:
            source: item.link
            targetContentType: ctaItem
            entryIdPattern: "{{parentId}}--ll--{{index}}"
            fields:
              internalName:
                template: "{{metadata.title}} logo link {{index}}"
              linkText:
                source: item.text
                required: true
              customiseStyle:
                default: true
              style:
                source: item.style
              openUrlInNewTab:
                source: item.openInNewTab
                transform: boolean
              useExternalLink:
                default: true
              externalUrl:
                source: item.url

