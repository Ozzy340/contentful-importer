document:
  targetContentType: contentPage
  entryIdPattern: "cp--{{sourceId}}"
  fields:
    internalName:
      source:
        - metadata.internalName
        - metadata.title
      template: "{{metadata.title}}"
    parent:
      source: metadata.parent
    heading:
      source: metadata.heading
      required: true
    slug:
      source: metadata.slug
      transform: slug
      required: true
    heroContentArea:
      strategy: componentReference
      component: HeroStandard
    excludeFromSearch:
      default: false
    metaTitle:
      source: metadata.metaTitle
    metaDescription:
      source: metadata.metaDescription
    bodyContentArea:
      strategy: blockReferences
      includeKinds:
        - richText
        - component
      excludeComponents:
        - HeroStandard

components:
  HeroStandard:
    targetContentType: heroBlock
    entryIdPattern: "{{parentId}}--hb--{{index}}"
    fields:
      internalName:
        source: block.props.internalName
        template: "{{metadata.title}} hero block {{index}}"
      heroStyle:
        source: block.props.heroStyle
        default: Standard
      headingFontStyle:
        source: block.props.headingFontStyle
        default: Regular
      eyebrowText:
        source: block.props.eyebrow
      subtitle:
        source: block.props.description
      lowerSubtext:
        source: block.props.lowerSubtext
      callToActions:
        strategy: nestedEntryLinks
        collection: callsToAction
      media:
        strategy: nestedEntryLink
        collection: media
      desktopImageSize:
        source: block.props.desktopImageSize
        default: Large
      hideImageAccent:
        source: block.props.hideImageAccent
        transform: boolean
        default: false
      theme:
        source: block.props.theme
        default: White
      applyGradient:
        source: block.props.applyGradient
        transform: boolean
        default: false
    nestedEntries:
      callsToAction:
        source: block.props.callsToAction
        targetContentType: ctaItem
        entryIdPattern: "{{parentId}}--hcta--{{index}}"
        fields:
          internalName:
            source: item.internalName
            template: "{{metadata.title}} hero cta {{index}}"
          linkText:
            source: item.text
            required: true
          customiseStyle:
            source: item.customiseStyle
            transform: boolean
            default: true
          style:
            source: item.style
          openUrlInNewTab:
            source: item.openInNewTab
            transform: boolean
          useExternalLink:
            source: item.useExternalLink
            transform: boolean
            default: true
          externalUrl:
            source: item.url
      media:
        source: block.props.image
        targetContentType: imageWithFocalPoint
        entryIdPattern: "{{parentId}}--hm--{{index}}"
        asset:
          source: item.path
          altSource: item.alt
          titleSource: item.title
          descriptionSource: item.description
          assetIdPattern: "asset--{{sourceId}}--hm--{{index}}"
        fields:
          title:
            source: item.title
            required: true
          image:
            source: linkedAsset
            required: true
          altText:
            source: item.alt
          focus:
            default: Center

  MissionFraming:
    targetContentType: promoBlock
    entryIdPattern: "{{parentId}}--mf--{{index}}"
    fields:
      internalName:
        template: "{{metadata.title}} mission framing {{index}}"
      heading:
        source: block.props.heading
        required: true
      headingStyle:
        default: h2
      statementText:
        source: block.props.eyebrow
      description:
        source: block.props.description
      callToAction:
        strategy: nestedEntryLink
        collection: callToAction
      style:
        default: White
      textColour:
        default: Grey
      hideCornerAccent:
        default: false
    nestedEntries:
      callToAction:
        source: block.props.callToAction
        targetContentType: ctaItem
        entryIdPattern: "{{parentId}}--mcta--{{index}}"
        fields:
          internalName:
            template: "{{metadata.title}} mission cta {{index}}"
          linkText:
            source: item.text
