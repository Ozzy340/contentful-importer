          customiseStyle:
            default: true
          style:
            source: item.style
          openUrlInNewTab:
            source: item.openInNewTab
            transform: boolean
          useExternalLink:
            default: true
          externalUrl:
            source: item.url

  StatsBlock:
    targetContentType: statisticsBlock
    entryIdPattern: "{{parentId}}--sb--{{index}}"
    fields:
      internalName:
        template: "{{metadata.title}} statistics block {{index}}"
      eyebrowText:
        source: block.props.eyebrow
      heading:
        source: block.props.heading
      headingStyle:
        default: h2
      style:
        default: Statistics
      statistics:
        strategy: nestedEntryLinks
